<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting to QR Wallet...</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const reference = params.get('reference') || params.get('trxref');
        
        let appUrl = 'qrwallet://payment/success';
        if (reference) {
            appUrl += '?reference=' + reference;
        }
        
        window.location.href = appUrl;
        
        setTimeout(function() {
            var messageEl = document.getElementById('message');
            messageEl.textContent = '';

            var h2 = document.createElement('h2');
            h2.textContent = 'Payment Complete!';

            var p1 = document.createElement('p');
            p1.textContent = 'If the app didn\'t open automatically, please open QR Wallet app manually.';

            var p2 = document.createElement('p');
            p2.textContent = 'Reference: ' + (reference || 'N/A');

            messageEl.appendChild(h2);
            messageEl.appendChild(p1);
            messageEl.appendChild(p2);
        }, 2000);
    </script>
</head>
<body style="font-family: Arial; text-align: center; padding-top: 100px;">
    <div id="message">
        <h2>Redirecting to QR Wallet...</h2>
        <p>Please wait...</p>
    </div>
</body>
</html>
